apiVersion: v1
kind: ServiceAccount
metadata:
  name: carbide-rest-cert-manager
  namespace: {{ include "carbide-rest-cert-manager.namespace" . }}
  labels:
    {{- include "carbide-rest-cert-manager.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: carbide-rest-cert-manager
  namespace: {{ include "carbide-rest-cert-manager.namespace" . }}
  labels:
    {{- include "carbide-rest-cert-manager.labels" . | nindent 4 }}
rules:
  # credsmgr reads/writes Kubernetes Secrets to store issued site credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # credsmgr reads ConfigMaps for runtime configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: carbide-rest-cert-manager
  namespace: {{ include "carbide-rest-cert-manager.namespace" . }}
  labels:
    {{- include "carbide-rest-cert-manager.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: carbide-rest-cert-manager
    namespace: {{ include "carbide-rest-cert-manager.namespace" . }}
roleRef:
  kind: Role
  name: carbide-rest-cert-manager
  apiGroup: rbac.authorization.k8s.io
